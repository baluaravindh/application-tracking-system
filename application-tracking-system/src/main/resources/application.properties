spring.application.name=application-tracking-system
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/application_tracking_system
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show formatted SQL in console
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
jwt.secret=balu-ats-super-secret-key-2024-must-be-256-bits-long-enough
#jwt.expiration=86400000
# 86400000 ms = 24 hours

# Shorten access token to 15 minutes for realism
jwt.expiration=900000

# Refresh token expiry — 7 days in milliseconds
jwt.refresh-expiration=604800000

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Queue names
rabbitmq.queue.application=application.queue
rabbitmq.queue.interview=interview.queue
rabbitmq.exchange=ats.exchange
rabbitmq.routing.key.application=application.routing.key
rabbitmq.routing.key.interview=interview.routing.key
